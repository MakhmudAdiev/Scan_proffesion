<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>📷 Игра с Камерой</title>
    <link rel="stylesheet" href="camera-game.css">
</head>
<body>
    <div class="game-wrapper">
        <div class="game-header">
            <h1>📷 Управление Движением</h1>
            <div class="score-panel">
                <div>Очки: <span id="score">0</span></div>
                <div>Время: <span id="time">60</span>с</div>
            </div>
        </div>
        
        <div class="camera-container">
            <video id="video" autoplay playsinline></video>
            <canvas id="gameCanvas" width="640" height="480"></canvas>
            <div id="overlay" class="overlay">
                <div class="target" id="target"></div>
            </div>
        </div>
        
        <div class="game-info">
            <p id="status">Загрузка камеры...</p>
            <p class="instructions">Двигайте головой или руками, чтобы управлять курсором. Ловите падающие объекты!</p>
        </div>
        
        <div class="controls">
            <button id="startBtn" class="btn">Начать игру</button>
            <button id="stopBtn" class="btn" style="display: none;">Остановить</button>
            <a href="games-menu.html" class="back-link">← Вернуться</a>
        </div>
    </div>
    
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs"></script>
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow-models/pose-detection"></script>
    <script src="camera-game.js"></script>
</body>
</html>
